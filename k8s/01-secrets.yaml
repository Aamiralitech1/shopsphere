# NOTE: Aapke vprofile app ke application.properties mein DB/RabbitMQ
# credentials hardcoded hain (root/vprodbpass, guest/guest), env-driven nahi.
# Isliye ye Secret seedha app mein inject nahi hoga - lekin MySQL/RabbitMQ
# CONTAINERS ke liye best practice ke taur par bana rahe hain, taaki
# concept clear ho aur future mein app ko env-driven banaya ja sake.
#
# Values custom Docker images ke Dockerfile mein already baked hain
# (Docker-files/db/Dockerfile mein ENV MYSQL_ROOT_PASSWORD="vprodbpass"),
# isliye db-statefulset.yaml mein hum is Secret ko mount nahi kar rahe -
# image ka built-in default already match karta hai application.properties se.

apiVersion: v1
kind: Secret
metadata:
  name: vprodb-secret
  namespace: vprofile
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "vprodbpass"
  MYSQL_DATABASE: "accounts"
---
apiVersion: v1
kind: Secret
metadata:
  name: vpromq-secret
  namespace: vprofile
type: Opaque
stringData:
  RABBITMQ_DEFAULT_USER: "guest"
  RABBITMQ_DEFAULT_PASS: "guest"
